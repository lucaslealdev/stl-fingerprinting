<!DOCTYPE html>
<html lang="pt-br" class="extrator-page">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extrator de Marca Invisível STL</title>
    <link rel="stylesheet" href="src/css/styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="src/js/core.js"></script>
    <script src="src/js/ui.js"></script>
    <script src="src/js/extractor.js"></script>
</head>
<body>
    <div id="loadingOverlay">
        <div class="spinner"></div>
        <p>Aguardando sistema...</p>
    </div>

    <nav>
        <a href="index.html">Gerador de Lote</a>
        <a href="extrator.html" class="active">Extrator de Marca</a>
    </nav>

    <div class="card">
        <h2>🛡️ Extrator STL</h2>
        <p>Selecione o arquivo STL e insira a chave do <code>key.txt</code>.</p>
        
        <label>Arquivo STL Marcado:</label>
        <input type="file" id="fileInput" accept=".stl" onchange="updateFileStatus()" onclick="showOverlay()" oncancel="hideOverlay()">
        
        <label>Chave de Segurança:</label>
        <input type="text" id="keyInput" placeholder="Cole a chave aqui...">
        
        <button onclick="extract()">Verificar Identidade</button>
        
        <div id="progress"><div id="progressBar"></div></div>
        <div class="status" id="statusText">Aguardando comando...</div>
        <div id="result"></div>
    </div>

</body>
</html>
