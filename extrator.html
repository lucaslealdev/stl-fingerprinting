<!DOCTYPE html>
<html lang="pt-br" class="extrator-page">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extrator de Marca Invisível STL</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>
    <nav>
        <a href="index.html">Gerador de Lote</a>
        <a href="extrator.html" class="active">Extrator de Marca</a>
    </nav>

    <div class="card">
        <h2>🛡️ Extrator STL</h2>
        <p>Selecione o arquivo STL e insira a chave do <code>key.txt</code>.</p>
        
        <label>Arquivo STL Marcado:</label>
        <input type="file" id="fileInput" accept=".stl">
        
        <label>Chave de Segurança:</label>
        <input type="text" id="keyInput" placeholder="Cole a chave aqui...">
        
        <button onclick="extract()">Verificar Identidade</button>
        
        <div id="result"></div>
    </div>

<script>
    function u8ToWords(u8) {
        const words = [];
        for (let i = 0; i < u8.length; i += 4) {
            words.push((u8[i] << 24) | (u8[i+1] << 16) | (u8[i+2] << 8) | (u8[i+3]));
        }
        return CryptoJS.lib.WordArray.create(words, u8.length);
    }

    async function extract() {
        const fileInput = document.getElementById('fileInput');
        const keyInput = document.getElementById('keyInput').value.trim();
        const resultDiv = document.getElementById('result');
        
        if (!fileInput.files[0] || !keyInput) {
            alert("Preencha todos os campos.");
            return;
        }

        resultDiv.style.display = "none";
        try {
            const buffer = await fileInput.files[0].arrayBuffer();
            const view = new DataView(buffer);
            const header = new TextDecoder().decode(buffer.slice(0, 5));
            if (header === "solid") throw new Error("Este arquivo está em formato ASCII. Use STL Binário.");
            if (buffer.byteLength < 84) throw new Error("Arquivo STL inválido.");

            const numTriangles = view.getUint32(80, true);
            let bits = [];
            let pos = 84;
            const targetBits = Math.min(numTriangles * 9, 4000);

            for (let i = 0; i < numTriangles && bits.length < targetBits; i++) {
                pos += 12;
                for (let v = 0; v < 9; v++) {
                    if (pos + 4 > buffer.byteLength) break;
                    let val = view.getUint32(pos, true);
                    bits.push(val & 1);
                    pos += 4;
                }
                pos += 2;
            }

            let bytes = new Uint8Array(Math.floor(bits.length / 8));
            for (let i = 0; i < bytes.length; i++) {
                let byte = 0;
                for (let j = 0; j < 8; j++) if (bits[i * 8 + j]) byte |= (1 << j);
                bytes[i] = byte;
            }

            const payloadLen = (bytes[0] << 24 | bytes[1] << 16 | bytes[2] << 8 | bytes[3]) >>> 0;
            if (payloadLen === 0 || payloadLen > bytes.length - 4) throw new Error("Marca não encontrada.");

            const fernetBase64 = new TextDecoder().decode(bytes.slice(4, 4 + payloadLen)).replace(/-/g, '+').replace(/_/g, '/');
            const binaryTokenString = atob(fernetBase64);
            const fernetData = new Uint8Array(binaryTokenString.length);
            for (let i = 0; i < binaryTokenString.length; i++) fernetData[i] = binaryTokenString.charCodeAt(i);
            
            if (fernetData.length < 57) throw new Error("Token Fernet inválido.");

            const iv = u8ToWords(fernetData.slice(9, 25));
            const ciphertext = u8ToWords(fernetData.slice(25, -32));
            const cleanKey = keyInput.replace(/-/g, '+').replace(/_/g, '/');
            const rawKey = CryptoJS.enc.Base64.parse(cleanKey);
            if (rawKey.sigBytes !== 32) throw new Error("Chave inválida.");

            const encKey = CryptoJS.lib.WordArray.create(rawKey.words.slice(4, 8));
            const decrypted = CryptoJS.AES.decrypt({ ciphertext: ciphertext }, encKey, { iv: iv, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7 });
            const result = decrypted.toString(CryptoJS.enc.Utf8);
            if (!result) throw new Error("Falha na descriptografia.");

            resultDiv.style.display = "block";
            resultDiv.className = "success";
            resultDiv.innerHTML = "<strong>✅ SUCESSO!</strong><br><br>ID Identificado:<br><code>" + result + "</code>";
        } catch (e) {
            resultDiv.style.display = "block";
            resultDiv.className = "error";
            resultDiv.innerHTML = "<strong>❌ ERRO:</strong><br>" + e.message;
        }
    }
</script>
</body>
</html>
