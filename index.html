<!DOCTYPE html>
<html lang="pt-br" class="maker-page">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STL Fingerprint Maker (Lote Personalizado)</title>
    <link rel="stylesheet" href="src/css/styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="src/js/core.js"></script>
    <script src="src/js/ui.js"></script>
    <script src="src/js/generator.js"></script>
</head>
<body>
    <div id="loadingOverlay">
        <div class="spinner"></div>
        <p>Aguardando sistema...</p>
    </div>

    <nav>
        <a href="index.html" class="active">Gerador de Lote</a>
        <a href="extrator.html">Extrator de Marca</a>
    </nav>

    <div class="card">
        <h2>💎 STL Maker (Lote)</h2>
        <p>Gere cópias marcadas com nomes ou e-mails específicos.</p>
        
        <label>Arquivo STL Original:</label>
        <input type="file" id="fileInput" accept=".stl" onchange="updateFileStatus()" onclick="showOverlay()" oncancel="hideOverlay()">
        
        <label>Lista de Destinatários (um por linha):</label>
        <textarea id="listInput" rows="6" placeholder="exemplo@email.com&#10;João Silva&#10;Maria Oliveira"></textarea>
        <p class="info">Cada linha gerará um arquivo STL único com a marca invisível.</p>

        <button id="btnGerar" onclick="generateBatch()">Gerar e Baixar ZIP</button>
        
        <div id="progress"><div id="progressBar"></div></div>
        <div class="status" id="statusText">Aguardando comando...</div>
    </div>

</body>
</html>
