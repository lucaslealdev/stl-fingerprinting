<!DOCTYPE html>
<html lang="pt-br" class="maker-page">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STL Fingerprint Maker (Lote Personalizado)</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>
    <div id="loadingOverlay">
        <div class="spinner"></div>
        <p>Aguardando sistema...</p>
    </div>

    <nav>
        <a href="index.html" class="active">Gerador de Lote</a>
        <a href="extrator.html">Extrator de Marca</a>
    </nav>

    <div class="card">
        <h2>💎 STL Maker (Lote)</h2>
        <p>Gere cópias marcadas com nomes ou e-mails específicos.</p>
        
        <label>Arquivo STL Original:</label>
        <input type="file" id="fileInput" accept=".stl" onchange="updateFileStatus()" onclick="showOverlay()" oncancel="hideOverlay()">
        
        <label>Lista de Destinatários (um por linha):</label>
        <textarea id="listInput" rows="6" placeholder="exemplo@email.com&#10;João Silva&#10;Maria Oliveira"></textarea>
        <p class="info">Cada linha gerará um arquivo STL único com a marca invisível.</p>

        <button id="btnGerar" onclick="generateBatch()">Gerar e Baixar ZIP</button>
        
        <div id="progress"><div id="progressBar"></div></div>
        <div class="status" id="statusText">Aguardando comando...</div>
    </div>

<script>
    const yieldToMain = (ms = 10) => new Promise(r => setTimeout(r, ms));

    function showOverlay() {
        document.getElementById('loadingOverlay').style.display = 'flex';
    }

    function hideOverlay() {
        console.log("Escondendo overlay de carregamento...");
        document.getElementById('loadingOverlay').style.display = 'none';
    }

    function updateFileStatus() {
        hideOverlay();
        const file = document.getElementById('fileInput').files[0];
        const status = document.getElementById('statusText');
        if (file) {
            status.innerText = `Arquivo selecionado: ${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)`;
        }
    }

    function sanitizeFilename(name) {
        return name.replace(/[^a-z0-9]/gi, '_').toLowerCase().substring(0, 50);
    }

    function encryptFernet(plaintext, keyB64) {
        const key = CryptoJS.enc.Base64.parse(keyB64.replace(/-/g, '+').replace(/_/g, '/'));
        const hmacKey = CryptoJS.lib.WordArray.create(key.words.slice(0, 4));
        const aesKey = CryptoJS.lib.WordArray.create(key.words.slice(4, 8));
        const version = CryptoJS.enc.Hex.parse('80');
        const timestamp = CryptoJS.lib.WordArray.create([0, Math.floor(Date.now() / 1000)], 8);
        const iv = CryptoJS.lib.WordArray.random(16);
        const encrypted = CryptoJS.AES.encrypt(plaintext, aesKey, {
            iv: iv, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7
        });
        const ciphertext = encrypted.ciphertext;
        const hmacPayload = version.clone().concat(timestamp).concat(iv).concat(ciphertext);
        const hmac = CryptoJS.HmacSHA256(hmacPayload, hmacKey);
        const token = hmacPayload.concat(hmac);
        return CryptoJS.enc.Base64.stringify(token).replace(/\+/g, '-').replace(/\//g, '_');
    }

    async function u8ToWords(u8, onProgress) {
        const words = [];
        const total = u8.length;
        for (let i = 0; i < total; i += 4) {
            if (i % 1000000 === 0 && onProgress) {
                onProgress(i / total);
                await yieldToMain();
            }
            words.push((u8[i] << 24) | (u8[i+1] << 16) | (u8[i+2] << 8) | (u8[i+3]));
        }
        return CryptoJS.lib.WordArray.create(words, u8.length);
    }

    async function generateBatch() {
        const fileInput = document.getElementById('fileInput');
        const listText = document.getElementById('listInput').value.trim();
        const recipients = listText.split('\n').map(r => r.trim()).filter(r => r.length > 0);
        const btn = document.getElementById('btnGerar');
        const status = document.getElementById('statusText');
        const bar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progress');

        if (!fileInput.files[0]) return alert("Selecione um arquivo STL.");
        if (recipients.length === 0) return alert("Insira ao menos um destinatário na lista.");

        btn.disabled = true;
        progressContainer.style.display = "block";
        bar.style.width = "0%";
        status.innerText = "Preparando processamento...";
        
        try {
            await yieldToMain(100);
            status.innerText = "Carregando arquivo original para memória...";
            await yieldToMain(50);
            const originalBuffer = await fileInput.files[0].arrayBuffer();
            const zip = new JSZip();
            const keyWA = CryptoJS.lib.WordArray.random(32);
            const keyB64 = CryptoJS.enc.Base64.stringify(keyWA).replace(/\+/g, '-').replace(/\//g, '_');
            zip.file("key.txt", keyB64);

            const stlName = fileInput.files[0].name.replace('.stl', '');
            const count = recipients.length;
            
            for (let i = 0; i < count; i++) {
                const currentRecipient = recipients[i];
                const baseProgress = (i / count) * 100;
                
                status.innerText = `[${i+1}/${count}] Criptografando: ${currentRecipient}`;
                bar.style.width = `${baseProgress}%`;
                await yieldToMain();

                const encryptedToken = encryptFernet(currentRecipient, keyB64);
                const tokenEncoder = new TextEncoder();
                const tokenBytes = tokenEncoder.encode(encryptedToken);
                const payload = new Uint8Array(4 + tokenBytes.length);
                new DataView(payload.buffer).setUint32(0, tokenBytes.length, false); 
                payload.set(tokenBytes, 4);

                let bits = [];
                for (let b of payload) {
                    for (let j = 0; j < 8; j++) bits.push((b >> j) & 1);
                }

                status.innerText = `[${i+1}/${count}] Aplicando marca: ${currentRecipient}`;
                await yieldToMain();

                const newBuffer = originalBuffer.slice(0);
                const view = new DataView(newBuffer);
                const numTriangles = view.getUint32(80, true);
                
                let bitIdx = 0;
                let pos = 84;
                for (let t = 0; t < numTriangles && bitIdx < bits.length; t++) {
                    pos += 12;
                    for (let v = 0; v < 9; v++) {
                        if (bitIdx >= bits.length) break;
                        let val = view.getUint32(pos, true);
                        if (bits[bitIdx]) val |= 1;
                        else val &= ~1;
                        view.setUint32(pos, val, true);
                        bitIdx++;
                        pos += 4;
                    }
                    pos += 2;
                }

                status.innerText = `[${i+1}/${count}] Calculando integridade: ${currentRecipient}`;
                bar.style.width = `${baseProgress + (0.5 / count) * 100}%`;
                await yieldToMain();

                const finalStlBytes = new Uint8Array(newBuffer);
                const words = await u8ToWords(finalStlBytes, (p) => {
                    bar.style.width = `${baseProgress + (0.5 + p * 0.4) / count * 100}%`;
                });
                const md5 = CryptoJS.MD5(words).toString();
                
                const sanitizedId = sanitizeFilename(currentRecipient);
                const baseFileName = `${stlName}_ID_${sanitizedId}`;
                zip.file(`${baseFileName}.stl`, finalStlBytes);
                zip.file(`${baseFileName}.txt`, md5);
                
                bar.style.width = `${((i + 1) / count) * 100}%`;
            }

            status.innerText = "Finalizando pacote ZIP...";
            bar.style.width = "100%";
            await yieldToMain();
            
            const zipBlob = await zip.generateAsync({type: "blob"}, (p) => {
                status.innerText = `Comprimindo ZIP: ${Math.round(p.percent)}%`;
            });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(zipBlob);
            link.download = `fingerprints_${stlName}.zip`;
            link.click();
            status.innerText = "Concluído! ZIP baixado com sucesso.";
        } catch (e) {
            console.error(e);
            status.innerText = "Erro no processamento.";
        } finally {
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
